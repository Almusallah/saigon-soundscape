<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saigon Sound Archive</title>
    <style>
        /* Base styles */
        body { 
            margin: 0; 
            padding: 0; 
            font-family: Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        header, footer { 
            background-color: #333; 
            color: white; 
            padding: 15px;
            text-align: center;
        }
        footer a {
            color: white;
            text-decoration: none;
        }
        footer a:hover {
            text-decoration: underline;
        }
        .content-wrapper {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
        }
        .location-search {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1;
            width: 300px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .upload-button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .storage-indicator.active {
            background-color: #4CAF50;
            color: white;
            padding: 2px 5px;
            border-radius: 3px;
        }
        .storage-indicator.inactive {
            background-color: #FF5722;
            color: white;
            padding: 2px 5px;
            border-radius: 3px;
        }
        
        /* Upload form styles */
        .form-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .upload-form {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .upload-form h2 {
            margin-top: 0;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        
        .form-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }
        
        .form-close:hover {
            color: #000;
        }
        
        .marker-pin {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-color: #FF5722;
            border: 2px solid white;
            cursor: pointer;
        }
        
        .map-error {
            padding: 20px;
            text-align: center;
            background-color: #f8f8f8;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .recording-marker {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #3887be;
            border: 2px solid #ffffff;
            cursor: pointer;
        }
        
        .loading-indicator {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Saigon Sound Archive</h1>
    </header>
    
    <div class="content-wrapper">
        <input type="text" id="location-search" class="location-search" placeholder="Search for a location...">
        <div id="map"></div>
        <button class="upload-button" id="upload-button">+</button>
    </div>
    
    <div class="form-overlay" id="form-overlay">
        <div class="upload-form" id="upload-form">
            <button class="form-close" id="form-close">&times;</button>
            <h2>Upload Audio Recording</h2>
            <form id="audio-form">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" required></textarea>
                </div>
                <div class="form-group">
                    <label for="audio-file">Audio File</label>
                    <input type="file" id="audio-file" name="audioFile" accept="audio/*" required>
                </div>
                <div class="form-group">
                    <label for="latitude">Latitude</label>
                    <input type="text" id="latitude" name="latitude" readonly required>
                </div>
                <div class="form-group">
                    <label for="longitude">Longitude</label>
                    <input type="text" id="longitude" name="longitude" readonly required>
                </div>
                <div class="form-actions">
                    <button type="button" id="cancel-button">Cancel</button>
                    <button type="submit" id="submit-button">Upload</button>
                </div>
            </form>
        </div>
    </div>
    
    <div class="loading-indicator" id="loading-indicator">
        <div>Uploading... Please wait</div>
    </div>
    
    <footer>
        <p>&copy; 2025 Saigon Sound Archive | Created by <a href="https://officinegap.com/" target="_blank">Officine Gặp</a></p>
    </footer>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">

    <script>
        // API endpoint configuration - THIS IS THE KEY CHANGE
        const API_URL = 'https://saigon-soundscape-production.up.railway.app/api';
        
        // Global variables
        let map;
        let tempMarker;
        let recordingsMarkers = [];
        
        // Function to update storage info in the footer
        function updateStorageInfo() {
            const footer = document.querySelector('footer p');
            
            fetch(`${API_URL}/health`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to fetch health info');
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Health API response:', data);
                    
                    if (data && data.storage) {
                        const storageClass = data.storage.storageClass || 'Unknown';
                        const storageWorking = data.storage.working ? 'Active' : 'Inactive';
                        const bucketName = data.storage.bucketName || '';
                        
                        footer.innerHTML = `&copy; 2025 Saigon Sound Archive | Created by <a href="https://officinegap.com/" target="_blank">Officine Gặp</a> | 
                                          Storage: <span class="storage-indicator ${data.storage.working ? 'active' : 'inactive'}">${storageClass} (${storageWorking})</span>`;
                        
                        if (bucketName) {
                            footer.innerHTML += ` | Bucket: ${bucketName}`;
                        }
                    } else {
                        setMockStorageInfo(footer);
                    }
                })
                .catch(error => {
                    console.error('Error fetching storage info:', error);
                    setMockStorageInfo(footer);
                });
        }
        
        // Fallback for storage info
        function setMockStorageInfo(element) {
            if (element) {
                element.innerHTML = `&copy; 2025 Saigon Sound Archive | Created by <a href="https://officinegap.com/" target="_blank">Officine Gặp</a> | 
                                   Storage: <span class="storage-indicator active">B2 Storage (Active)</span>`;
            }
        }
        
        // Function to open the upload form
        function openUploadForm() {
            const formOverlay = document.getElementById('form-overlay');
            if (formOverlay) {
                formOverlay.style.display = 'flex';
            }
        }
        
        // Function to close the upload form
        function closeUploadForm() {
            const formOverlay = document.getElementById('form-overlay');
            if (formOverlay) {
                formOverlay.style.display = 'none';
            }
            
            // Remove temporary marker if it exists
            if (tempMarker) {
                tempMarker.remove();
                tempMarker = null;
            }
            
            // Reset form
            const audioForm = document.getElementById('audio-form');
            if (audioForm) {
                audioForm.reset();
            }
        }
        
        // Function to show loading indicator
        function showLoading() {
            const loadingIndicator = document.getElementById('loading-indicator');
            if (loadingIndicator) {
                loadingIndicator.style.display = 'flex';
            }
        }
        
        // Function to hide loading indicator
        function hideLoading() {
            const loadingIndicator = document.getElementById('loading-indicator');
            if (loadingIndicator) {
                loadingIndicator.style.display = 'none';
            }
        }
        
        // Initialize the map
        function initMap() {
            try {
                // Set Mapbox token
                mapboxgl.accessToken = 'pk.eyJ1Ijoic2lkZXdhbGtjaXR5IiwiYSI6ImNtN2c3Z28zZzBiZmsya3M3eXU2emEzOXQifQ.hLfguhn2EXIhg3XZL1_Dcw';
                
                // Create map
                map = new mapboxgl.Map({
                    container: 'map',
                    style: 'mapbox://styles/mapbox/streets-v11',
                    center: [106.6953, 10.7765], // Ho Chi Minh City
                    zoom: 12,
                    minZoom: 10, // Restrict zoom out
                    maxZoom: 18, // Allow good zoom in
                    maxBounds: [ // Restrict to area around HCMC
                        [106.5, 10.6], // Southwest coordinates
                        [106.9, 10.9]  // Northeast coordinates
                    ]
                });
                
                // Add navigation controls
                map.addControl(new mapboxgl.NavigationControl());
                
                // Add geolocation control
                map.addControl(
                    new mapboxgl.GeolocateControl({
                        positionOptions: {
                            enableHighAccuracy: true
                        },
                        trackUserLocation: true
                    })
                );
                
                // Add click handler to map
                map.on('click', function(e) {
                    // Set form coordinates
                    document.getElementById('latitude').value = e.lngLat.lat.toFixed(6);
                    document.getElementById('longitude').value = e.lngLat.lng.toFixed(6);
                    
                    // Add marker at clicked location
                    if (tempMarker) {
                        tempMarker.remove();
                    }
                    
                    // Create marker element
                    const el = document.createElement('div');
                    el.className = 'marker-pin';
                    
                    // Add marker to map
                    tempMarker = new mapboxgl.Marker(el)
                        .setLngLat(e.lngLat)
                        .addTo(map);
                    
                    // Open the form
                    openUploadForm();
                });
                
                // Load existing recordings when map is ready
                map.on('load', function() {
                    console.log('Map initialized successfully, loading recordings');
                    loadRecordings();
                });
                
                console.log('Map initialized successfully');
            } catch (error) {
                console.error('Error initializing map:', error);
                const mapContainer = document.getElementById('map');
                if (mapContainer) {
                    mapContainer.innerHTML = '<div class="map-error"><h3>Map could not be loaded</h3><p>Please check your internet connection or try refreshing the page.</p></div>';
                }
            }
        }
        
        // Load recordings from API
        function loadRecordings() {
            fetch(`${API_URL}/recordings`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to fetch recordings');
                    }
                    return response.json();
                })
                .then(data => {
                    if (data && data.recordings && data.recordings.length > 0) {
                        addRecordingsToMap(data.recordings);
                    } else {
                        console.log('No recordings available yet');
                    }
                })
                .catch(error => {
                    console.error('Error loading recordings:', error);
                });
        }
        
        // Add recordings to map
        function addRecordingsToMap(recordings) {
            // Clear existing markers
            recordingsMarkers.forEach(marker => marker.remove());
            recordingsMarkers = [];
            
            // Add new markers
            recordings.forEach(recording => {
                try {
                    // Create marker element
                    const el = document.createElement('div');
                    el.className = 'recording-marker';
                    
                    // Create popup
                    const popup = new mapboxgl.Popup({ offset: 25 })
                        .setHTML(`
                            <h3>${recording.title}</h3>
                            <p>${recording.description || 'No description'}</p>
                            <audio controls>
                                <source src="${recording.audioUrl}" type="audio/mpeg">
                                Your browser does not support the audio element.
                            </audio>
                        `);
                    
                    // Create marker
                    const marker = new mapboxgl.Marker(el)
                        .setLngLat([recording.longitude, recording.latitude])
                        .setPopup(popup)
                        .addTo(map);
                    
                    // Save marker reference
                    recordingsMarkers.push(marker);
                } catch (error) {
                    console.error('Error adding recording marker:', error);
                }
            });
        }
        
        // Handle form submission
        function setupFormHandlers() {
            const uploadButton = document.getElementById('upload-button');
            const formOverlay = document.getElementById('form-overlay');
            const closeFormButton = document.getElementById('form-close');
            const cancelButton = document.getElementById('cancel-button');
            const audioForm = document.getElementById('audio-form');
            
            // Open form when clicking + button
            if (uploadButton) {
                uploadButton.addEventListener('click', openUploadForm);
            }
            
            // Close form with X button
            if (closeFormButton) {
                closeFormButton.addEventListener('click', closeUploadForm);
            }
            
            // Close form with Cancel button
            if (cancelButton) {
                cancelButton.addEventListener('click', closeUploadForm);
            }
            
            // Close form when clicking outside
            if (formOverlay) {
                formOverlay.addEventListener('click', function(e) {
                    if (e.target === formOverlay) {
                        closeUploadForm();
                    }
                });
            }
            
            // Handle form submission
            if (audioForm) {
                audioForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    // Validate form
                    const title = document.getElementById('title').value;
                    const lat = document.getElementById('latitude').value;
                    const lng = document.getElementById('longitude').value;
                    const audioFile = document.getElementById('audio-file').files[0];
                    
                    if (!title) {
                        alert('Please enter a title');
                        return;
                    }
                    
                    if (!lat || !lng) {
                        alert('Please click on the map to set the recording location');
                        return;
                    }
                    
                    if (!audioFile) {
                        alert('Please select an audio file');
                        return;
                    }
                    
                    // Create form data
                    const formData = new FormData(audioForm);
                    
                    // Show loading
                    showLoading();
                    
                    // Disable submit button
                    const submitButton = document.getElementById('submit-button');
                    if (submitButton) {
                        submitButton.disabled = true;
                    }
                    
                    // Upload to API
                    fetch(`${API_URL}/upload`, {
                        method: 'POST',
                        body: formData
                    })
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Failed to upload recording');
                        }
                        return response.json();
                    })
                    .then(data => {
                        console.log('Upload successful:', data);
                        alert('Recording uploaded successfully!');
                        
                        // Reset and close form
                        closeUploadForm();
                        
                        // Reload recordings
                        loadRecordings();
                    })
                    .catch(error => {
                        console.error('Error uploading recording:', error);
                        alert('Failed to upload recording. Please try again.');
                    })
                    .finally(() => {
                        // Hide loading
                        hideLoading();
                        
                        // Re-enable submit button
                        if (submitButton) {
                            submitButton.disabled = false;
                        }
                    });
                });
            }
        }
        
        // Initialize the application when the DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing application');
            
            // Initialize the map
            initMap();
            
            // Setup form handlers
            setupFormHandlers();
            
            // Update storage info
            updateStorageInfo();
            
            // Update storage info every 5 minutes
            setInterval(updateStorageInfo, 5 * 60 * 1000);
        });
    </script>
</body>
</html>
