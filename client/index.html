<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Saigon Sound Archive</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
  <style>
    /* ── Reset & Layout ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; background: #111; color: #fff; }
    header { background: #222; padding: 12px 16px; text-align: center; }
    header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
    .map-wrap { flex: 1; position: relative; overflow: hidden; }
    #map { position: absolute; inset: 0; }
    footer { background: #222; padding: 8px 16px; text-align: center; font-size: 12px; color: #888; }

    /* ── Map controls ──────────────────────────────────────────────── */
    .map-controls { position: absolute; top: 10px; right: 10px; z-index: 10; display: flex; gap: 6px; }
    .ctrl-btn { background: #fff; border: none; border-radius: 4px; padding: 7px 12px; font-size: 12px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
    .ctrl-btn:hover { background: #f0f0f0; }

    /* ── Upload FAB ────────────────────────────────────────────────── */
    .fab { position: absolute; bottom: 24px; left: 16px; z-index: 10; width: 48px; height: 48px; border-radius: 50%; background: #4CAF50; color: #fff; border: none; font-size: 28px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; }

    /* ── Markers ────────────────────────────────────────────────────── */
    .marker { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; transition: transform .15s; }
    .marker:hover { transform: scale(1.4); }
    .temp-marker { width: 16px; height: 16px; border-radius: 50%; background: #FF5722; border: 2px solid #fff; cursor: pointer; }

    /* ── Popups ─────────────────────────────────────────────────────── */
    .mapboxgl-popup-content { padding: 14px; min-width: 220px; max-width: 300px; border-radius: 8px; }
    .mapboxgl-popup-content h3 { margin: 0 0 4px; font-size: 15px; }
    .mapboxgl-popup-content p { margin: 0 0 6px; color: #666; font-size: 13px; }
    .mapboxgl-popup-content audio { width: 100%; margin-top: 8px; }
    .cat-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; color: #fff; margin-top: 4px; }

    /* ── Overlay / Form ────────────────────────────────────────────── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; justify-content: center; align-items: center; }
    .overlay.open { display: flex; }
    .form-card { background: #fff; color: #333; border-radius: 10px; padding: 24px; width: 90%; max-width: 460px; max-height: 85vh; overflow-y: auto; position: relative; }
    .form-card h2 { margin-bottom: 16px; font-size: 18px; }
    .form-close { position: absolute; top: 10px; right: 14px; background: none; border: none; font-size: 22px; cursor: pointer; color: #666; }
    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .fg input, .fg textarea, .fg select { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
    .fg textarea { resize: vertical; min-height: 60px; }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }
    .btn { padding: 9px 18px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #4CAF50; color: #fff; }
    .btn-cancel { background: #eee; color: #333; }

    /* ── Recorder ───────────────────────────────────────────────────── */
    .recorder { border: 1px solid #ddd; border-radius: 6px; padding: 10px; margin-bottom: 12px; }
    .recorder .controls { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .rec-btn { padding: 7px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; color: #fff; }
    .rec-btn.record { background: #f44336; }
    .rec-btn.stop { background: #333; }
    .rec-btn.play { background: #2196F3; }
    .rec-status { font-size: 12px; color: #888; margin-top: 6px; }

    /* ── Archive panel ─────────────────────────────────────────────── */
    .archive { position: fixed; top: 0; right: -360px; width: 360px; height: 100%; background: #222; z-index: 999; transition: right .3s; overflow-y: auto; box-shadow: -2px 0 8px rgba(0,0,0,.3); }
    .archive.open { right: 0; }
    .archive-head { position: sticky; top: 0; background: #1a1a1a; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .archive-head h2 { font-size: 16px; }
    .archive-close { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; }
    .filter-wrap { padding: 10px 16px; }
    .filter-wrap select { width: 100%; padding: 8px; background: #333; color: #fff; border: 1px solid #444; border-radius: 4px; }
    .rec-list { list-style: none; }
    .rec-item { padding: 14px 16px; border-bottom: 1px solid #333; cursor: pointer; }
    .rec-item:hover { background: #2a2a2a; }
    .rec-item h3 { font-size: 14px; margin-bottom: 4px; }
    .rec-item p { font-size: 12px; color: #999; }
    .rec-item audio { width: 100%; margin-top: 8px; }

    /* ── Loading ────────────────────────────────────────────────────── */
    .loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 2000; justify-content: center; align-items: center; color: #fff; font-size: 16px; }
    .loading.show { display: flex; }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header h1 { font-size: 16px; }
      .archive { width: 85%; right: -85%; }
      .map-controls { flex-direction: column; }
    }
  </style>
</head>
<body>

<header><h1>Saigon Sound Archive</h1></header>

<div class="map-wrap">
  <div id="map"></div>
  <div class="map-controls">
    <button class="ctrl-btn" id="style-toggle">Satellite View</button>
    <button class="ctrl-btn" id="archive-btn">Archive</button>
  </div>
  <button class="fab" id="upload-btn" title="New recording">+</button>
</div>

<footer>&copy; 2025 Saigon Sound Archive &middot; <span id="storage-info"></span></footer>

<!-- Upload form overlay -->
<div class="overlay" id="form-overlay">
  <div class="form-card">
    <button class="form-close" id="form-close">&times;</button>
    <h2>New Recording</h2>

    <div class="recorder">
      <label style="font-weight:600;font-size:13px;">Record audio</label>
      <div class="controls">
        <button class="rec-btn record" id="rec-start">Record</button>
        <button class="rec-btn stop"   id="rec-stop" disabled>Stop</button>
        <button class="rec-btn play"   id="rec-play" disabled>Play</button>
      </div>
      <div class="rec-status" id="rec-status">Tap Record to start</div>
    </div>

    <form id="upload-form">
      <div class="fg">
        <label>Or upload a file</label>
        <input type="file" id="audio-file" accept="audio/*,.webm,.mp3,.m4a,.mp4,.ogg,.wav">
      </div>
      <div class="fg">
        <label>Title *</label>
        <input type="text" id="f-title" required placeholder="e.g. Morning market sounds">
      </div>
      <div class="fg">
        <label>Description</label>
        <textarea id="f-desc" placeholder="What can be heard?"></textarea>
      </div>
      <div class="fg">
        <label>Category *</label>
        <select id="f-category" required>
          <option value="">Select...</option>
          <option>Eateries</option><option>Sidewalks</option><option>Street Vendors</option>
          <option>Music</option><option>Home</option><option>Eating</option>
          <option>Work</option><option>Repairing</option><option>Water</option>
          <option>Animals</option><option>Conversations</option><option>Vehicles</option>
          <option>Sports</option><option>Places of worship</option><option>Markets</option>
          <option>Shops</option><option>Construction Sites</option><option>Playing</option>
          <option>Rain</option><option>Boat</option><option>Others</option>
        </select>
      </div>
      <input type="hidden" id="f-lat">
      <input type="hidden" id="f-lng">
      <div class="form-actions">
        <button type="button" class="btn btn-cancel" id="form-cancel">Cancel</button>
        <button type="submit" class="btn btn-primary" id="form-submit">Upload</button>
      </div>
    </form>
  </div>
</div>

<!-- Archive panel -->
<div class="archive" id="archive-panel">
  <div class="archive-head">
    <h2>Archive</h2>
    <button class="archive-close" id="archive-close">&times;</button>
  </div>
  <div class="filter-wrap">
    <select id="cat-filter">
      <option value="">All categories</option>
      <option>Eateries</option><option>Sidewalks</option><option>Street Vendors</option>
      <option>Music</option><option>Home</option><option>Eating</option>
      <option>Work</option><option>Repairing</option><option>Water</option>
      <option>Animals</option><option>Conversations</option><option>Vehicles</option>
      <option>Sports</option><option>Places of worship</option><option>Markets</option>
      <option>Shops</option><option>Construction Sites</option><option>Playing</option>
      <option>Rain</option><option>Boat</option><option>Others</option>
    </select>
  </div>
  <ul class="rec-list" id="rec-list"></ul>
</div>

<!-- Loading indicator -->
<div class="loading" id="loading"><span>Uploading...</span></div>

<!-- Scripts -->
<script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
<script>
(function () {
  'use strict';

  // ── Config ──────────────────────────────────────────────────────
  const API = 'https://saigon-soundscape.onrender.com/api';
  const MAPBOX_TOKEN = 'pk.eyJ1Ijoic2lkZXdhbGtjaXR5IiwiYSI6ImNtOHplcGZnaTBiNXEya3IwODFuMTMxZmYifQ.79iRhWzXiNR140OKQIS6PQ';
  const SAIGON = [106.6953, 10.7765];
  const REFRESH_INTERVAL = 120_000; // 2 min

  // Category → colour map
  const CAT_COLORS = {
    'Eateries':'#FF5722','Sidewalks':'#2196F3','Street Vendors':'#FFC107',
    'Music':'#9C27B0','Home':'#4CAF50','Eating':'#E91E63','Work':'#795548',
    'Repairing':'#607D8B','Water':'#00BCD4','Animals':'#8BC34A',
    'Conversations':'#FFEB3B','Vehicles':'#FF9800','Sports':'#03A9F4',
    'Places of worship':'#673AB7','Markets':'#CDDC39','Shops':'#009688',
    'Construction Sites':'#F44336','Playing':'#3F51B5','Rain':'#00BCD4',
    'Boat':'#0097A7','Others':'#9E9E9E',
  };
  const DEFAULT_COLOR = '#3887be';

  // ── State ───────────────────────────────────────────────────────
  let map, recordings = [], markers = [], tempMarker = null;
  let currentStyle = 'streets-v11';
  let mediaRecorder, recordedChunks = [], recordedBlob = null;

  // ── DOM refs ────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);

  // ── Map ─────────────────────────────────────────────────────────
  function initMap() {
    mapboxgl.accessToken = MAPBOX_TOKEN;
    map = new mapboxgl.Map({
      container: 'map',
      style: `mapbox://styles/mapbox/${currentStyle}`,
      center: SAIGON,
      zoom: 12,
      minZoom: 10,
      maxZoom: 18,
    });
    map.addControl(new mapboxgl.NavigationControl(), 'top-left');
    map.addControl(new mapboxgl.GeolocateControl({ positionOptions: { enableHighAccuracy: true }, trackUserLocation: true }), 'top-left');

    map.on('load', () => {
      console.log('Map loaded');
      loadRecordings();
      setInterval(loadRecordings, REFRESH_INTERVAL);
    });

    // Click map → set pin for new recording
    map.on('click', e => {
      if (e.originalEvent.target.closest('.marker') || e.originalEvent.target.closest('.mapboxgl-popup')) return;
      const { lng, lat } = e.lngLat;
      $('f-lat').value = lat.toFixed(6);
      $('f-lng').value = lng.toFixed(6);
      if (tempMarker) { tempMarker.setLngLat(e.lngLat); }
      else {
        const el = document.createElement('div');
        el.className = 'temp-marker';
        tempMarker = new mapboxgl.Marker(el).setLngLat(e.lngLat).addTo(map);
      }
    });
  }

  // ── Load & render recordings ────────────────────────────────────
  async function loadRecordings() {
    try {
      const res = await fetch(`${API}/recordings`);
      if (!res.ok) throw new Error(res.statusText);
      const data = await res.json();
      if (!Array.isArray(data.recordings)) return;
      recordings = data.recordings.filter(r => r && typeof r.latitude === 'number' && typeof r.longitude === 'number' && r.audioUrl);
      console.log(`Loaded ${recordings.length} recordings`);
      renderMarkers();
    } catch (err) {
      console.error('Failed to load recordings:', err);
    }
  }

  function renderMarkers() {
    markers.forEach(m => m.remove());
    markers = [];
    for (const r of recordings) {
      try {
        const cat = extractCategory(r);
        const color = CAT_COLORS[cat] || DEFAULT_COLOR;

        const el = document.createElement('div');
        el.className = 'marker';
        el.style.backgroundColor = color;

        const audioType = guessAudioType(r.audioUrl);
        const popup = new mapboxgl.Popup({ offset: 25, maxWidth: '300px' }).setHTML(`
          <h3>${esc(r.title || 'Untitled')}</h3>
          <p>${esc(r.description || '')}</p>
          ${cat ? `<span class="cat-tag" style="background:${color}">${esc(cat)}</span>` : ''}
          <audio controls preload="metadata">
            <source src="${esc(r.audioUrl)}" type="${audioType}">
          </audio>
        `);

        const m = new mapboxgl.Marker(el)
          .setLngLat([r.longitude, r.latitude])
          .setPopup(popup)
          .addTo(map);
        markers.push(m);
      } catch (err) {
        console.error('Marker error:', err);
      }
    }
  }

  function extractCategory(r) {
    if (r.category && r.category !== 'Others') return r.category;
    const m = (r.title || '').match(/^\[(.*?)\]/);
    return m ? m[1] : (r.category || '');
  }

  function guessAudioType(url) {
    const ext = url.split('.').pop().split('?')[0].toLowerCase();
    const types = { mp3: 'audio/mpeg', webm: 'audio/webm', ogg: 'audio/ogg', wav: 'audio/wav', m4a: 'audio/mp4', mp4: 'audio/mp4', aac: 'audio/mp4' };
    return types[ext] || 'audio/mpeg';
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  // ── Style toggle ────────────────────────────────────────────────
  $('style-toggle').onclick = () => {
    currentStyle = currentStyle === 'streets-v11' ? 'satellite-streets-v11' : 'streets-v11';
    map.setStyle(`mapbox://styles/mapbox/${currentStyle}`);
    $('style-toggle').textContent = currentStyle === 'streets-v11' ? 'Satellite View' : 'Street View';
    map.once('styledata', () => renderMarkers());
  };

  // ── Upload form ─────────────────────────────────────────────────
  function openForm()  { $('form-overlay').classList.add('open'); }
  function closeForm() { $('form-overlay').classList.remove('open'); resetRecorder(); }

  $('upload-btn').onclick = () => {
    if (!$('f-lat').value || !$('f-lng').value) { alert('Tap the map first to set a location.'); return; }
    openForm();
  };
  $('form-close').onclick = closeForm;
  $('form-cancel').onclick = closeForm;
  $('form-overlay').onclick = e => { if (e.target === $('form-overlay')) closeForm(); };

  $('upload-form').onsubmit = async e => {
    e.preventDefault();
    const title = $('f-title').value.trim();
    const cat   = $('f-category').value;
    if (!title) { alert('Title is required.'); return; }
    if (!cat)   { alert('Category is required.'); return; }

    let blob, filename;
    const fileInput = $('audio-file').files[0];
    if (recordedBlob && fileInput) {
      blob = confirm('Use your recording instead of the file?') ? recordedBlob : fileInput;
    } else {
      blob = recordedBlob || fileInput;
    }
    if (!blob) { alert('Record or select an audio file.'); return; }

    filename = blob.name || `recording.${(blob.type || 'audio/webm').split('/')[1]?.split(';')[0] || 'webm'}`;

    // Prepend category to title
    const fullTitle = `[${cat}] ${title}`;

    const fd = new FormData();
    fd.append('audioFile', blob, filename);
    fd.append('title', fullTitle);
    fd.append('description', $('f-desc').value);
    fd.append('category', cat);
    fd.append('latitude', $('f-lat').value);
    fd.append('longitude', $('f-lng').value);

    $('loading').classList.add('show');
    $('form-submit').disabled = true;

    try {
      const res = await fetch(`${API}/upload`, { method: 'POST', body: fd });
      if (!res.ok) throw new Error(await res.text());
      alert('Upload successful!');
      closeForm();
      $('upload-form').reset();
      loadRecordings();
    } catch (err) {
      alert('Upload failed: ' + err.message);
    } finally {
      $('loading').classList.remove('show');
      $('form-submit').disabled = false;
    }
  };

  // ── Audio recorder ──────────────────────────────────────────────
  $('rec-start').onclick = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          sampleRate: { ideal: 48000, min: 44100 },
          channelCount: { ideal: 2 },
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
          latency: { ideal: 0 },
        }
      });
      recordedChunks = []; recordedBlob = null;
      // pick best available codec — prefer opus (excellent at high bitrate)
      const mimeType = ['audio/webm;codecs=opus','audio/webm','audio/mp4']
        .find(m => MediaRecorder.isTypeSupported(m));
      mediaRecorder = new MediaRecorder(stream, {
        ...(mimeType ? { mimeType } : {}),
        audioBitsPerSecond: 256000,
      });
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        recordedBlob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
        stream.getTracks().forEach(t => t.stop());
        $('rec-status').textContent = `Recorded (${(recordedBlob.size / 1024).toFixed(0)} KB)`;
        $('rec-play').disabled = false;
      };
      mediaRecorder.start();
      $('rec-status').textContent = 'Recording...';
      $('rec-start').disabled = true;
      $('rec-stop').disabled = false;
    } catch (err) {
      alert('Microphone access denied.');
    }
  };

  $('rec-stop').onclick = () => {
    if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
    $('rec-start').disabled = false;
    $('rec-stop').disabled = true;
  };

  $('rec-play').onclick = () => {
    if (!recordedBlob) return;
    new Audio(URL.createObjectURL(recordedBlob)).play();
  };

  function resetRecorder() {
    if (mediaRecorder?.state === 'recording') mediaRecorder.stop();
    recordedChunks = []; recordedBlob = null;
    $('rec-start').disabled = false;
    $('rec-stop').disabled = true;
    $('rec-play').disabled = true;
    $('rec-status').textContent = 'Tap Record to start';
  }

  // ── Archive panel ───────────────────────────────────────────────
  $('archive-btn').onclick  = () => $('archive-panel').classList.toggle('open');
  $('archive-close').onclick = () => $('archive-panel').classList.remove('open');
  $('cat-filter').onchange  = updateArchiveList;

  function updateArchiveList() {
    const filter = $('cat-filter').value;
    const list = $('rec-list');
    const filtered = filter ? recordings.filter(r => extractCategory(r) === filter) : recordings;

    list.innerHTML = filtered.map(r => {
      const cat = extractCategory(r);
      const color = CAT_COLORS[cat] || DEFAULT_COLOR;
      return `
        <li class="rec-item" data-lat="${r.latitude}" data-lng="${r.longitude}">
          <h3>${esc(r.title || 'Untitled')}</h3>
          ${cat ? `<span class="cat-tag" style="background:${color}">${esc(cat)}</span>` : ''}
          <p>${esc(r.description || '')}</p>
          <audio controls preload="metadata">
            <source src="${esc(r.audioUrl)}" type="${guessAudioType(r.audioUrl)}">
          </audio>
        </li>`;
    }).join('');

    // Click archive item → fly to location
    list.querySelectorAll('.rec-item').forEach(el => {
      el.onclick = e => {
        if (e.target.closest('audio')) return; // don't fly when clicking player
        const lat = parseFloat(el.dataset.lat);
        const lng = parseFloat(el.dataset.lng);
        map.flyTo({ center: [lng, lat], zoom: 15 });
        $('archive-panel').classList.remove('open');
      };
    });
  }

  // ── Init ────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    console.log('Saigon Sound Archive v2.0');
    initMap();
  });

})();
</script>
</body>
</html>
